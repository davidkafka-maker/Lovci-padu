<html lang="cs">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lovci pádů</title>
<style>
  :root {
    --bg: #f4f6fb;
    --card: #ffffff;
    --text: #111827;
    --muted: #6b7280;
    --good: #15803d;
    --bad: #b91c1c;
  }
  * { box-sizing: border-box; }
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: var(--bg);
    margin: 0;
    padding: 20px;
    color: var(--text);
  }
  .wrap {
    max-width: 760px;
    margin: 0 auto;
  }
  .card {
    background: var(--card);
    border-radius: 18px;
    padding: 18px;
    box-shadow: 0 8px 22px rgba(0,0,0,.08);
    margin-bottom: 14px;
  }
  h1 {
    margin: 0 0 12px;
    font-size: 32px;
  }
  .sub {
    color: var(--muted);
    margin-bottom: 16px;
  }
  .field {
    width: min(320px, 92%);
    padding: 12px 14px;
    border: 1px solid #d1d5db;
    border-radius: 12px;
    font-size: 16px;
    margin: 6px auto;
    display: block;
  }
  .menu-btn, .small-btn {
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 700;
  }
  .menu-btn {
    padding: 14px 18px;
    font-size: 19px;
    width: min(340px, 92%);
    margin: 8px auto;
    display: block;
  }
  .small-btn {
    padding: 10px 14px;
    font-size: 15px;
    background: #1f2937;
    color: #fff;
  }
  .mode-wrap {
    margin: 14px 0;
    display: flex;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .mode-label {
    font-weight: 700;
  }
  .topbar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .timer {
    font-size: 24px;
    font-weight: 800;
  }
  #progress {
    font-size: 20px;
    font-weight: 800;
    min-height: 52px;
    white-space: pre-line;
    margin-bottom: 8px;
  }
  .task {
    color: var(--muted);
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  #sentence {
    font-size: 28px;
    line-height: 1.45;
    max-width: 720px;
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 10px auto 16px;
    padding: 0 6px;
  }
  .highlight {
    font-weight: 800;
    text-decoration: underline;
    color: #111827;
    display: inline-block;
    margin: 0 0.22em;
    padding: 0 0.02em;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(150px, 190px));
    gap: 12px;
    justify-content: center;
    margin-top: 14px;
  }
  .btn {
    padding: 16px 10px;
    font-size: 18px;
    border: none;
    border-radius: 14px;
    color: white;
    cursor: pointer;
    font-weight: 800;
    transition: transform .08s ease, opacity .12s ease;
  }
  .btn:active {
    transform: scale(.98);
  }
  .btn:disabled {
    opacity: .78;
    cursor: not-allowed;
  }
  #result {
    font-size: 30px;
    margin-top: 18px;
    font-weight: 800;
    white-space: pre-line;
    min-height: 78px;
  }
  .good { color: var(--good); }
  .bad { color: var(--bad); }
  .hidden { display: none !important; }
  .note {
    font-size: 13px;
    color: var(--muted);
    margin-top: 8px;
  }
  .stats-box {
    text-align: left;
    max-width: 420px;
    margin: 0 auto;
    line-height: 1.8;
    font-size: 18px;
  }

  #confetti-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 9999;
  }
  .confetti {
    position: fixed;
    top: -20px;
    width: 12px;
    height: 18px;
    opacity: 0.95;
    border-radius: 2px;
    animation: confetti-fall linear forwards;
  }
  @keyframes confetti-fall {
    from {
      transform: translate3d(0, -10px, 0) rotate(0deg);
      opacity: 1;
    }
    to {
      transform: translate3d(var(--drift), 110vh, 0) rotate(var(--spin));
      opacity: 0;
    }
  }


@media (max-width: 600px) {
  body {
    padding: 6px;
  }
  .wrap {
    max-width: 100%;
  }
  .card {
    border-radius: 12px;
    padding: 10px 9px;

    line-height: 1.3;
    min-height: 64px;
    margin: 6px auto 10px;
    padding: 0 2px;
    display: block;
    text-align: center;
    white-space: normal;
    word-break: normal;
    overflow-wrap: normal;
    hyphens: none;
  }
  .highlight {
    margin: 0 0.10em;
  }
  .grid {
    grid-template-columns: repeat(2, minmax(135px, 1fr));
    gap: 8px;
    width: 100%;
    justify-content: center;
    margin-top: 8px;
  }
  .btn {
    width: 100%;
    font-size: 18px;
    padding: 10px 6px;
    border-radius: 10px;
  }
  #result {
    font-size: 32px;
    min-height: 72px;
    margin-top: 10px;
    line-height: 1.25;
    font-weight: 900;
    letter-spacing: 0.3px;
  }
  #nextBtn {
    margin-top: 8px !important;
    font-size: 15px;
    padding: 10px 12px;
  }
  .stats-box {
    font-size: 15px;
    line-height: 1.45;
  }
  .note {
    font-size: 11px;
    margin-top: 6px;
  }
  .win { font-size: 36px; }
  .correct-answer { font-size: 28px; }
  .explain { font-size: 22px; }

}


.win { font-size: 34px; }
.correct-answer { font-size: 26px; }

</style>

<div id="confetti-layer" aria-hidden="true"></div>
<div class="wrap">

  <div id="login" class="card">
    <h1>Lovci pádů</h1>
    <div class="sub">Vyplň údaje a začni hrát.</div>

    <div id="rememberBox" class="hidden">
      <div class="card" style="box-shadow:none;border:1px solid #e5e7eb;">
        <div style="font-weight:700;margin-bottom:10px;">Pokračovat jako:</div>
        <div id="rememberText" style="font-size:20px;font-weight:800;"></div>
        <button class="menu-btn" style="background:#2563eb;color:#fff;" onclick="useRemembered()">POKRAČOVAT</button>
        <button class="menu-btn" style="background:#e5e7eb;color:#111827;" onclick="showEditProfile()">ZMĚNIT ÚDAJE</button>
      </div>
    </div>

    <div id="formBox">
      <input id="name" class="field" placeholder="Jméno">
      <input id="surname" class="field" placeholder="Příjmení">
      <input id="class" class="field" placeholder="Třída">
      <div class="note">Třídu piš velkými písmeny a čísly bez teček, např. 3A.</div>

      <button class="menu-btn" style="background:#111827;color:#fff;" onclick="start()">ZAČÍT HRÁT</button>
    </div>
  </div>

  <div id="game" class="card hidden">
    <div class="topbar">
      <div class="timer">Čas: <span id="time">20</span></div>
      <button class="small-btn" onclick="menu()">MENU</button>
    </div>

    <div id="progress"></div>
    <div class="task">Urči pád zvýrazněného slova.</div>
    <div id="sentence"></div>

    <div class="grid" id="grid"></div>
    <div id="result"></div>
    <button id="nextBtn" class="menu-btn hidden" style="background:#2563eb;color:#fff;margin-top:10px;">DALŠÍ</button>
  </div>

  <div id="statsScreen" class="card hidden">
    <h1>Statistika</h1>
    <div class="stats-box" id="statsText"></div>
    <button class="menu-btn" style="background:#111827;color:#fff;" onclick="backToLogin()">ZPĚT</button>
  </div>

</div>

let current = null;

let seriesWords = [];
const RECENT_LIMIT = 40;

const colors = ["#2563eb","#16a34a","#7c3aed","#ea580c","#dc2626","#0891b2","#92400e"];

const caseLabels = {
  1: "NOMINATIV",
  2: "GENITIV",
  3: "DATIV",
  4: "AKUZATIV",
  5: "VOKATIV",
  6: "LOKÁL",
  7: "INSTRUMENTÁL"
};

function getCaseLabel(answerNumber) {
  return caseLabels[answerNumber] || "";
}

function ensureAudio() {
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return null;
    if (!audioCtx) audioCtx = new Ctx();
    if (audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  } catch (e) {
    return null;
  }
}

function tone(from, to, duration, vol) {
  const ctx = ensureAudio();
  if (!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  const now = ctx.currentTime;
  osc.frequency.setValueAtTime(from, now);
  osc.frequency.exponentialRampToValueAtTime(to, now + duration);
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(vol, now + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
  osc.start(now);
  osc.stop(now + duration);
}

function soundCorrect() { tone(700, 950, 0.16, 0.08); }

  tone(260, 110, 0.22, 0.32);
  setTimeout(() => tone(170, 80, 0.26, 0.36), 90);
}

  tone(523, 659, 0.24, 0.95);
  setTimeout(() => tone(659, 784, 0.24, 1.00), 110);
  setTimeout(() => tone(784, 1046, 0.30, 1.00), 220);

function launchConfetti() {
  const layer = document.getElementById("confetti-layer");
  if (!layer) return;
  layer.innerHTML = "";

  const total = 220;
  for (let i = 0; i < total; i++) {
    const el = document.createElement("div");
    el.className = "confetti";
    el.style.left = `${Math.random() * 100}vw`;
    el.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDuration = `${2.8 + Math.random() * 2.2}s`;
    el.style.animationDelay = `${Math.random() * 0.35}s`;
    el.style.setProperty("--drift", `${-220 + Math.random() * 440}px`);
    el.style.setProperty("--spin", `${360 + Math.random() * 1080}deg`);
    el.style.width = `${8 + Math.random() * 8}px`;
    el.style.height = `${10 + Math.random() * 12}px`;
    layer.appendChild(el);
  }
  setTimeout(() => { layer.innerHTML = ""; }, 6000);
}

  const remembered = localStorage.getItem("lovci_pady_profile");

function createButtons() {
  const g = document.getElementById("grid");
  if (buttonsCreated) return;

  const cases = [
    { label: "NOMINATIV", value: 1 },
    { label: "GENITIV", value: 2 },
    { label: "DATIV", value: 3 },
    { label: "AKUZATIV", value: 4 },
    { label: "VOKATIV", value: 5 },
    { label: "LOKÁL", value: 6 },
    { label: "INSTRUMENTÁL", value: 7 }
  ];

  cases.forEach((item, index) => {
    const b = document.createElement("button");
    b.className = "btn";
    b.style.background = colors[index];
    b.innerText = item.label;
    b.onclick = () => answer(item.value);
    g.appendChild(b);
  });

  buttonsCreated = true;
}

function disableButtons(flag) {
  document.querySelectorAll("#grid .btn").forEach(btn => btn.disabled = flag);
}

function start() {
  mode = "hard";

  let profile = null;
  if (document.getElementById("login").dataset.useRemembered === "1") {
    const remembered = localStorage.getItem("lovci_pady_profile");
    if (remembered) profile = JSON.parse(remembered);
  } else {
    const name = document.getElementById("name").value.trim();
    const surname = document.getElementById("surname").value.trim();
    const className = document.getElementById("class").value.trim().toUpperCase();
    if (!name || !surname || !className) {
      alert("Vyplň jméno, příjmení i třídu.");
      return;
    }
    profile = { name, surname, className };
    localStorage.setItem("lovci_pady_profile", JSON.stringify(profile));
  }

  document.getElementById("login").classList.add("hidden");
  document.getElementById("statsScreen").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  createButtons();
  correctSeries = 0;
  recentWords = [];
  seriesWords = [];
  nextQuestion();
}

function updateProgress() {
  document.getElementById("progress").innerText = "ZVLÁDNUTÉ PŘÍPADY: " + correctSeries + " / 10";
}

function chooseQuestion() {
  let candidates = db.filter(q => !recentWords.includes(String(q.highlightedWord).toLowerCase()));
  if (mode === "hard") {
    candidates = candidates.filter(q => !seriesWords.includes(String(q.highlightedWord).toLowerCase()));
  }

  if (candidates.length === 0) {
    candidates = db.filter(q => mode !== "hard" || !seriesWords.includes(String(q.highlightedWord).toLowerCase()));
  }
  if (candidates.length === 0) {
    candidates = db.slice();
  }

  return candidates[Math.floor(Math.random() * candidates.length)];
}

function registerWord(word) {
  recentWords.push(String(word).toLowerCase());
  if (recentWords.length > RECENT_LIMIT) recentWords.shift();
  if (mode === "hard" && !seriesWords.includes(String(word).toLowerCase())) {
    seriesWords.push(String(word).toLowerCase());
  }
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function highlightSentence(sentence, word) {
  const safeSentence = String(sentence || "");
  const safeWord = String(word || "");
  const idx = safeSentence.indexOf(safeWord);
  if (idx === -1 || !safeWord) return escapeHtml(safeSentence);

  const before = safeSentence.slice(0, idx);
  const match = safeSentence.slice(idx, idx + safeWord.length);
  const after = safeSentence.slice(idx + safeWord.length);

  return escapeHtml(before) + '<span class="highlight">' + escapeHtml(match) + '</span>' + escapeHtml(after);
}

function nextQuestion() {
  clearInterval(timer);
  waitingForNext = false;
  disableButtons(false);
  time = 6;
  document.getElementById("time").innerText = time;
  updateProgress();

  current = chooseQuestion();
  registerWord(current.highlightedWord);

  document.getElementById("sentence").innerHTML = highlightSentence(current.sentence, current.highlightedWord);
  document.getElementById("result").innerHTML = "";
  const nextBtn = document.getElementById("nextBtn");
  if (nextBtn) nextBtn.classList.add("hidden");

  if (mode === "hard") {
    timer = setInterval(() => {
      time--;
      document.getElementById("time").innerText = time;
      if (time <= 0) fail();
    }, 1000);
  }
}

function answer(n) {
  if (!current || waitingForNext) return;
  clearInterval(timer);
  disableButtons(true);

  if (n === current.answerNumber) {
    soundCorrect();
    document.getElementById("result").innerText = "SPRÁVNĚ";
    correctSeries++;
    updateProgress();

    if (correctSeries >= 10) {
      soundWin();
      launchConfetti();
      document.getElementById("result").innerHTML = '<span class="win">MÁŠ JEDNIČKU</span>';
      return;
    }
    setTimeout(nextQuestion, 1000);
  } else {
    soundWrong();
    waitingForNext = true;
    document.getElementById("result").innerHTML =
      'CHYBA<br><span class="correct-answer">SPRÁVNĚ: ' + getCaseLabel(current.answerNumber) + '</span>';
    const nextBtn = document.getElementById("nextBtn");
    if (nextBtn) {
      nextBtn.classList.remove("hidden");
      nextBtn.disabled = false;
      nextBtn.textContent = "DALŠÍ";
    }
    correctSeries = 0;
    seriesWords = [];
    updateProgress();
  }
}

function fail() {
  clearInterval(timer);
  disableButtons(true);
  soundWrong();
  document.getElementById("result").innerText = "VYPRŠEL ČAS";
  correctSeries = 0;
  seriesWords = [];
  updateProgress();
  setTimeout(nextQuestion, 1500);
}

document.addEventListener("DOMContentLoaded", () => {
  const nextBtn = document.getElementById("nextBtn");
  if (nextBtn) {
    nextBtn.addEventListener("click", () => {
      if (!waitingForNext) return;
      nextQuestion();
    });
  }
  loadRemembered();
});
